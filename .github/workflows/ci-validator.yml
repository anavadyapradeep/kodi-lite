name: KODI Lite Protocol Compliance CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate-protocol:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Validation Tools
        run: |
          python -m pip install --upgrade pip
          pip install check-jsonschema

      - name: Validate OpenDI Schema Compliance
        run: |
          echo "Scanning templates folder for protocol validation..."
          check-jsonschema --schemafile schemas/Causal-Decision-Model.json templates/*.json
